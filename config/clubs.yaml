# Club and venue configuration for eFanXP calendar sync.
# Sources are tried in order; all enabled sources are combined.
# ESPN (public API, no key) is primary — works from GitHub Actions.

clubs:

  - id: boca-juniors
    name: Boca Juniors
    country: AR
    sport: football
    home_venue: La Bombonera
    calendar_color: "11"  # Tomato
    sources:
      - adapter: espn
        league: arg.1
        team_id: "5"
        verified: true
      - adapter: thesportsdb
        team_id: "135156"
        verified: true
      - adapter: venue_scraper
        url: https://www.bocajuniors.com.ar/fixtures
        enabled: false

