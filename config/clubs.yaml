  - id: bahia
    name: Esporte Clube Bahia
    country: BR
    sport: football
    home_venue: Arena Fonte Nova
    calendar_color: "5"  # Banana
    sources:
      - adapter: api_sports_football
        team_id: "118"
        verified: true
      - adapter: thesportsdb
        team_id: "133771"
        verified: false
      - adapter: venue_scraper
        url: https://www.casadeapostasfontenova.com.br/agenda/
        enabled: true
        selectors:
          event_list: ".eventos-lista, .agenda-item, article.event"
          title: "h2, h3, .event-title"
          date: ".event-date, time"
          description: ".event-description, p"

  - id: selknam
    name: Selknam Rugby
    country: CL
    sport: rugby
    home_venue: Centro de Alto Rendimiento de Rugby (CARR)
    calendar_color: "10"  # Basil
    sources:
      - adapter: api_sports_rugby
        team_id: "28"  # Selknam ID in API-Sports Super Rugby Americas
        league_id: "58"  # Super Rugby Americas
        verified: false  # verify at https://v1.rugby.api-sports.io/teams
      - adapter: thesportsdb
        league_id: "5169"  # Super Liga Americana
        team_name: "Selknam"
        team_id: null
        verified: false
