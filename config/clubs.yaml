# Club and venue configuration for eFanXP calendar sync.
# Sources are tried in order; first successful result is used.
# Sofascore (unofficial, no key) is primary — full future fixture coverage.

clubs:

  - id: boca-juniors
    name: Boca Juniors
    country: AR
    sport: football
    home_venue: La Bombonera
    calendar_color: "11"  # Tomato
    sources:
      - adapter: sofascore
        team_id: "3202"
        verified: true
      - adapter: thesportsdb
        team_id: "135156"
        verified: true
      - adapter: venue_scraper
        url: https://www.bocajuniors.com.ar/fixtures
        enabled: false

