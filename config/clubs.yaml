  - id: universidad-de-chile
    name: Universidad de Chile
    country: CL
    sport: football
    home_venue: Estadio Nacional Julio Martínez Pradanos
    calendar_color: "9"  # Blueberry
    sources:
      - adapter: api_sports_football
        team_id: "2323"
        verified: true
      - adapter: thesportsdb
        team_id: "135424"
