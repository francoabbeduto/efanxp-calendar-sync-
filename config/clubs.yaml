# Club and venue configuration for eFanXP calendar sync.
# Each club has one or more source adapters in priority order.
# The system tries sources in order and uses the first successful result.
#
# API-Sports Football team IDs can be verified at:
#   https://v3.football.api-sports.io/teams?search=<club+name>
# (requires your API key in the x-apisports-key header)

clubs:

  - id: boca-juniors
    name: Boca Juniors
    country: AR
    sport: football
    home_venue: La Bombonera
    calendar_color: "11"  # Tomato
    sources:
      - adapter: api_sports_football
        team_id: "451"
        verified: true
      - adapter: thesportsdb
        team_id: "135156"
        verified: true
      - adapter: venue_scraper
        url: https://www.bocajuniors.com.ar/fixtures
        enabled: false

  - id: river-plate
    name: River Plate
    country: AR
    sport: football
    home_venue: Estadio Monumental
    calendar_color: "11"  # Tomato
    sources:
      - adapter: api_sports_football
        team_id: "435"
        verified: true
      - adapter: thesportsdb
        team_id: "135171"
        verified: true

  - id: estudiantes
    name: Estudiantes de La Plata
    country: AR
    sport: football
    home_venue: Estadio Jorge Luis Hirschi
